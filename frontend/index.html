<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Soundwave Premium</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #141414;
  --bg-tertiary: #1f1f1f;
  --surface: rgba(255,255,255,0.05);
  --surface-hover: rgba(255,255,255,0.08);
  --text-primary: #ffffff;
  --text-secondary: rgba(255,255,255,0.7);
  --text-tertiary: rgba(255,255,255,0.4);
  --accent: #1db954;
  --accent-hover: #1ed760;
  --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 8px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.6);
  --border-radius: 12px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── LAYOUT ── */
.app-container {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 280px;
  background: var(--bg-secondary);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  overflow-y: auto;
  transition: var(--transition);
}

.logo {
  font-size: 28px;
  font-weight: 700;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  font-size: 32px;
  filter: drop-shadow(0 0 8px rgba(102, 126, 234, 0.5));
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 16px;
  border-radius: var(--border-radius);
  cursor: pointer;
  transition: var(--transition);
  color: var(--text-secondary);
}

.nav-item:hover {
  background: var(--surface-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--surface);
  color: var(--text-primary);
}

.upload-zone {
  margin-top: auto;
  padding: 20px;
  border: 2px dashed rgba(255,255,255,0.2);
  border-radius: var(--border-radius);
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  background: var(--surface);
}

.upload-zone:hover {
  border-color: var(--accent);
  background: rgba(29, 185, 84, 0.1);
}

.upload-icon {
  font-size: 32px;
  margin-bottom: 8px;
  opacity: 0.7;
}

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg-primary);
}

.top-bar {
  padding: 24px 32px;
  background: var(--bg-secondary);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.search-bar {
  flex: 1;
  max-width: 480px;
  position: relative;
}

.search-input {
  width: 100%;
  padding: 12px 16px 12px 48px;
  background: var(--surface);
  border: 1px solid transparent;
  border-radius: 24px;
  color: var(--text-primary);
  font-size: 14px;
  transition: var(--transition);
}

.search-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg-tertiary);
}

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.5;
}

.user-profile {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 24px;
  transition: var(--transition);
}

.user-profile:hover {
  background: var(--surface);
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
}

/* ── CONTENT AREA ── */
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 32px;
}

.content-header {
  margin-bottom: 32px;
}

.content-title {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.6) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.content-subtitle {
  color: var(--text-secondary);
  font-size: 16px;
}

/* ── TRACK GRID ── */
.track-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 24px;
}

.track-card {
  background: var(--bg-secondary);
  border-radius: var(--border-radius);
  padding: 16px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}

.track-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gradient);
  opacity: 0;
  transition: opacity 0.3s;
}

.track-card:hover::before {
  opacity: 0.1;
}

.track-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}

.track-card.playing {
  background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
  border: 1px solid rgba(102, 126, 234, 0.3);
}

.track-artwork {
  width: 100%;
  aspect-ratio: 1;
  background: var(--gradient);
  border-radius: 8px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  position: relative;
  overflow: hidden;
}

.track-artwork::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.3) 100%);
}

.playing-indicator {
  position: absolute;
  bottom: 12px;
  right: 12px;
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-md);
  z-index: 10;
  animation: pulse 2s infinite;
}

.track-card.playing .playing-indicator {
  display: flex;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.equalizer {
  display: flex;
  gap: 3px;
  height: 16px;
  align-items: flex-end;
}

.equalizer span {
  width: 3px;
  background: white;
  border-radius: 2px;
  animation: eq 0.8s ease-in-out infinite;
}

.equalizer span:nth-child(1) { animation-delay: 0s; height: 40%; }
.equalizer span:nth-child(2) { animation-delay: 0.2s; height: 70%; }
.equalizer span:nth-child(3) { animation-delay: 0.4s; height: 50%; }

@keyframes eq {
  0%, 100% { height: 30%; }
  50% { height: 100%; }
}

.track-info {
  position: relative;
  z-index: 1;
}

.track-name {
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.track-card.playing .track-name {
  color: var(--accent);
}

.track-meta {
  font-size: 12px;
  color: var(--text-tertiary);
}

/* ── PLAYER BAR ── */
.player-bar {
  background: var(--bg-secondary);
  border-top: 1px solid rgba(255,255,255,0.05);
  padding: 16px 24px;
  display: flex;
  gap: 24px;
  align-items: center;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.now-playing {
  display: flex;
  gap: 16px;
  align-items: center;
  min-width: 240px;
}

.np-artwork {
  width: 56px;
  height: 56px;
  background: var(--gradient);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
}

.np-artwork::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: rotate 3s linear infinite;
  opacity: 0;
}

.player-bar.playing .np-artwork::before {
  opacity: 1;
}

@keyframes rotate {
  to { transform: rotate(360deg); }
}

.np-info {
  flex: 1;
  min-width: 0;
}

.np-title {
  font-weight: 600;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.np-artist {
  font-size: 12px;
  color: var(--text-secondary);
}

.player-controls {
  flex: 1;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.control-buttons {
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: center;
}

.ctrl-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.ctrl-btn:hover {
  color: var(--text-primary);
  background: var(--surface);
}

.ctrl-btn.active {
  color: var(--accent);
}

.play-btn {
  width: 40px;
  height: 40px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  box-shadow: var(--shadow-md);
}

.play-btn:hover {
  background: var(--accent-hover);
  transform: scale(1.08);
}

.play-btn:active {
  transform: scale(0.95);
}

.progress-bar {
  display: flex;
  align-items: center;
  gap: 12px;
}

.time {
  font-size: 11px;
  color: var(--text-tertiary);
  min-width: 40px;
  font-variant-numeric: tabular-nums;
}

.progress-track {
  flex: 1;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.progress-track::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gradient);
  opacity: 0.2;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.1s linear;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  position: relative;
  transition: width 0.1s linear;
}

.progress-fill::after {
  content: '';
  position: absolute;
  right: -6px;
  top: 50%;
  transform: translateY(-50%);
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.progress-track:hover .progress-fill::after {
  opacity: 1;
}

.volume-control {
  display: flex;
  gap: 12px;
  align-items: center;
  min-width: 180px;
}

.volume-slider {
  flex: 1;
  height: 4px;
  -webkit-appearance: none;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.volume-slider::-webkit-slider-thumb:hover {
  transform: scale(1.2);
}

/* ── MOBILE STYLES ── */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: -280px;
    top: 0;
    bottom: 0;
    z-index: 1000;
    box-shadow: var(--shadow-lg);
  }
  
  .sidebar.open {
    left: 0;
  }
  
  .content-title {
    font-size: 32px;
  }
  
  .track-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  
  .player-bar {
    flex-direction: column;
    gap: 16px;
    padding-bottom: calc(env(safe-area-inset-bottom, 0) + 16px);
  }
  
  .now-playing {
    width: 100%;
  }
  
  .player-controls {
    width: 100%;
  }
  
  .volume-control {
    display: none;
  }
  
  .top-bar {
    padding: 16px 20px;
  }
  
  .content-area {
    padding: 20px;
  }
}

.status-indicator {
  padding: 12px 20px;
  margin: 20px 32px;
  background: var(--surface);
  border-radius: var(--border-radius);
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
}

.status-indicator.loading .status-dot {
  animation: blink 1s infinite;
}

.status-indicator.error {
  background: rgba(255, 69, 58, 0.1);
  border: 1px solid rgba(255, 69, 58, 0.3);
  color: #ff453a;
}

.status-indicator.error .status-dot {
  background: #ff453a;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-tertiary);
}

.empty-icon {
  font-size: 64px;
  opacity: 0.3;
  margin-bottom: 16px;
}

#file-input {
  display: none;
}
</style>
</head>
<body>

<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <span class="logo-icon">♪</span>
      <span>Soundwave</span>
    </div>
    
    <nav>
      <div class="nav-item active">
        <span>🏠</span>
        <span>Library</span>
      </div>
      <div class="nav-item">
        <span>🔍</span>
        <span>Search</span>
      </div>
      <div class="nav-item">
        <span>❤️</span>
        <span>Favorites</span>
      </div>
    </nav>
    
    <div class="upload-zone" id="upload-zone">
      <div class="upload-icon">⬆️</div>
      <div style="font-weight: 600; margin-bottom: 4px;">Add Music</div>
      <div style="font-size: 12px; color: var(--text-tertiary);">Upload MP3 files</div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <div class="top-bar">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" placeholder="Search your library..." id="search-input">
      </div>
      <div class="user-profile">
        <div class="avatar">U</div>
        <span>User</span>
      </div>
    </div>

    <!-- Content -->
    <div class="content-area">
      <div class="content-header">
        <h1 class="content-title">Your Library</h1>
        <p class="content-subtitle" id="track-count">0 songs</p>
      </div>
      
      <div class="status-indicator" id="status-indicator">
        <div class="status-dot"></div>
        <span id="status-text">Loading...</span>
      </div>

      <div class="empty-state" id="empty-state" style="display: none;">
        <div class="empty-icon">♪</div>
        <p>Your library is empty</p>
        <p style="font-size: 14px; margin-top: 8px;">Upload some music to get started</p>
      </div>

      <div class="track-grid" id="track-grid"></div>
    </div>
  </main>
</div>

<!-- Player Bar -->
<div class="player-bar" id="player-bar">
  <div class="now-playing">
    <div class="np-artwork">♪</div>
    <div class="np-info">
      <div class="np-title" id="np-title">No track playing</div>
      <div class="np-artist">Select a song</div>
    </div>
  </div>

  <div class="player-controls">
    <div class="control-buttons">
      <button class="ctrl-btn" id="btn-shuffle">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M2 5h4a5 5 0 014 2l2 2.5M13 5h3m0 0l-2 2m2-2l-2-2M11 12.5l-2 2.5a5 5 0 01-4 2H2m11 0h3m0 0l-2-2m2 2l-2 2M11 12.5l2 2.5a5 5 0 004 2h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      
      <button class="ctrl-btn" id="btn-prev">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6v12M18 6l-9 6 9 6V6z"/>
        </svg>
      </button>

      <button class="play-btn" id="btn-play">
        <svg id="ico-play" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
          <path d="M5 3l12 7-12 7V3z"/>
        </svg>
        <svg id="ico-pause" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" style="display: none;">
          <rect x="5" y="3" width="3" height="14" rx="1.5"/>
          <rect x="12" y="3" width="3" height="14" rx="1.5"/>
        </svg>
      </button>

      <button class="ctrl-btn" id="btn-next">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 6v12M6 6l9 6-9 6V6z"/>
        </svg>
      </button>

      <button class="ctrl-btn" id="btn-repeat">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M2 7h14m0 0l-3-3m3 3l-3 3M18 13H4m0 0l3 3m-3-3l3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="progress-bar">
      <span class="time" id="time-current">0:00</span>
      <div class="progress-track" id="progress-track">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      <span class="time" id="time-total">0:00</span>
    </div>
  </div>

  <div class="volume-control">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
      <path d="M2 7h3l4-4v14l-4-4H2V7z"/>
      <path d="M13 6a4 4 0 010 8M15 4a7 7 0 010 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    </svg>
    <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80">
  </div>
</div>

<input type="file" id="file-input" accept=".mp3,audio/mpeg" multiple>
<audio id="audio"></audio>

<script>
const BASE = `${window.location.protocol}//${window.location.hostname}:8080`;
const audio = document.getElementById('audio');
let tracks = [], current = -1, shuffle = false, repeat = false;

// Utils
function cleanName(f) { 
  return f.replace(/\.mp3$/i,'').replace(/[_-]/g,' ').trim(); 
}

function fmt(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}

function setStatus(msg, type = '') {
  const indicator = document.getElementById('status-indicator');
  const text = document.getElementById('status-text');
  text.textContent = msg;
  indicator.className = 'status-indicator' + (type ? ' ' + type : '');
}

// Render tracks
function renderTracks() {
  const grid = document.getElementById('track-grid');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('track-count');
  
  count.textContent = `${tracks.length} ${tracks.length === 1 ? 'song' : 'songs'}`;
  
  if (!tracks.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  
  empty.style.display = 'none';
  grid.innerHTML = tracks.map((t, i) => `
    <div class="track-card ${i === current ? 'playing' : ''}" data-index="${i}">
      <div class="track-artwork">
        <span>♪</span>
        <div class="playing-indicator">
          <div class="equalizer">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
      <div class="track-info">
        <div class="track-name">${cleanName(t.filename)}</div>
        <div class="track-meta">Song ${String(i+1).padStart(2,'0')}</div>
      </div>
    </div>
  `).join('');
  
  // Add click handlers
  grid.querySelectorAll('.track-card').forEach(card => {
    card.addEventListener('click', () => {
      play(parseInt(card.dataset.index));
    });
  });
}

// Play track
function play(i) {
  if (i < 0 || i >= tracks.length) return;
  current = i;
  const name = cleanName(tracks[i].filename);
  document.getElementById('np-title').textContent = name;
  document.getElementById('player-bar').classList.add('playing');
  audio.src = `${BASE}/music/${tracks[i].id}`;
  audio.volume = document.getElementById('volume-slider').value / 100;
  audio.play();
  renderTracks();
}

// Playback state
function setPlaying(playing) {
  document.getElementById('ico-play').style.display = playing ? 'none' : 'block';
  document.getElementById('ico-pause').style.display = playing ? 'block' : 'none';
  
  if (playing) {
    document.getElementById('player-bar').classList.add('playing');
  } else {
    document.getElementById('player-bar').classList.remove('playing');
  }
}

// Audio events
audio.addEventListener('play', () => { setPlaying(true); renderTracks(); });
audio.addEventListener('pause', () => { setPlaying(false); renderTracks(); });

audio.addEventListener('ended', () => {
  if (repeat) {
    play(current);
  } else if (shuffle && tracks.length > 1) {
    let n;
    do { n = Math.floor(Math.random() * tracks.length); } while (n === current);
    play(n);
  } else if (current + 1 < tracks.length) {
    play(current + 1);
  }
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const percent = (audio.currentTime / audio.duration * 100);
  document.getElementById('progress-fill').style.width = percent + '%';
  document.getElementById('time-current').textContent = fmt(audio.currentTime);
  document.getElementById('time-total').textContent = fmt(audio.duration);
});

// Controls
document.getElementById('btn-play').addEventListener('click', () => {
  if (!audio.src && tracks.length) { play(0); return; }
  audio.paused ? audio.play() : audio.pause();
});

document.getElementById('btn-prev').addEventListener('click', () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  play(current > 0 ? current - 1 : tracks.length - 1);
});

document.getElementById('btn-next').addEventListener('click', () => {
  play(current < tracks.length - 1 ? current + 1 : 0);
});

document.getElementById('btn-shuffle').addEventListener('click', (e) => {
  shuffle = !shuffle;
  if (shuffle) repeat = false;
  e.currentTarget.classList.toggle('active', shuffle);
  document.getElementById('btn-repeat').classList.remove('active');
});

document.getElementById('btn-repeat').addEventListener('click', (e) => {
  repeat = !repeat;
  if (repeat) shuffle = false;
  e.currentTarget.classList.toggle('active', repeat);
  document.getElementById('btn-shuffle').classList.remove('active');
});

document.getElementById('progress-track').addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});

document.getElementById('volume-slider').addEventListener('input', (e) => {
  audio.volume = e.target.value / 100;
});

// Upload
document.getElementById('upload-zone').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  
  setStatus(`Uploading ${files.length} file(s)...`, 'loading');
  
  for (const file of files) {
    if (!file.name.toLowerCase().endsWith('.mp3')) continue;
    
    const fd = new FormData();
    fd.append('file', file);
    
    try {
      const res = await fetch(`${BASE}/music`, { method: 'POST', body: fd });
      if (!res.ok) throw new Error('HTTP ' + res.status);
    } catch (e) {
      setStatus('Upload failed: ' + e.message, 'error');
      return;
    }
  }
  
  setStatus('Upload complete!');
  await loadTracks();
  e.target.value = '';
});

// Search
document.getElementById('search-input').addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();
  document.querySelectorAll('.track-card').forEach(card => {
    const name = card.querySelector('.track-name').textContent.toLowerCase();
    card.style.display = name.includes(query) ? 'block' : 'none';
  });
});

// Load tracks
async function loadTracks() {
  setStatus('Loading...', 'loading');
  try {
    const res = await fetch(`${BASE}/music`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    tracks = (await res.json()) || [];
    renderTracks();
    setStatus(`${tracks.length} song(s) loaded`);
    setTimeout(() => {
      document.getElementById('status-indicator').style.display = 'none';
    }, 2000);
  } catch (e) {
    setStatus('Cannot reach server: ' + e.message, 'error');
    tracks = [];
    renderTracks();
  }
}

loadTracks();
</script>
</body>
</html>
