<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SOUNDWAVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#e8001a;--red2:#ff1a30;--red-dim:#7a0010;
  --black:#07070a;--black2:#0d0d10;--black3:#141418;
  --white:#f2ede6;--grey:#2a2a30;--grey2:#3e3e46;--grey3:#5a5a64;
  --ft:'Bebas Neue',sans-serif;--fb:'Space Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;overflow-x:hidden}
body{min-height:100vh;background:var(--black);color:var(--white);font-family:var(--fb);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");background-size:300px;pointer-events:none;z-index:9990;opacity:.3}

.layout{display:grid;grid-template-columns:340px 1fr;min-height:100vh}
@media(max-width:860px){.layout{grid-template-columns:1fr}}

/* ─ LEFT PANEL ─ */
.left{background:var(--black2);border-right:1px solid var(--grey);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden}
@media(max-width:860px){.left{position:relative;height:auto}}

.logo{padding:18px 22px 14px;border-bottom:1px solid var(--grey);display:flex;align-items:baseline;gap:8px;flex-shrink:0}
.logo-t{font-family:var(--ft);font-size:30px;letter-spacing:.08em;line-height:1}
.logo-t em{color:var(--red);font-style:normal;text-shadow:0 0 16px rgba(232,0,26,.45)}
.logo-sub{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--grey3)}

/* Vinyl */
.disc-wrap{flex-shrink:0;padding:18px 22px 14px;display:flex;flex-direction:column;align-items:center;gap:12px;border-bottom:1px solid var(--grey)}
.disc{width:148px;height:148px;border-radius:50%;background:conic-gradient(#0e0e12 0deg,#191920 22deg,#0e0e12 44deg,#191920 66deg,#0e0e12 88deg,#191920 110deg,#0e0e12 132deg,#191920 154deg,#0e0e12 176deg,#191920 198deg,#0e0e12 220deg,#191920 242deg,#0e0e12 264deg,#191920 286deg,#0e0e12 308deg,#191920 330deg,#0e0e12 352deg,#191920 360deg);box-shadow:0 0 0 11px #111116,0 0 0 12px #222228,0 4px 28px rgba(0,0,0,.8);position:relative;transition:box-shadow .4s}
.disc::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;border-radius:50%;background:radial-gradient(circle,var(--red) 0%,var(--red-dim) 55%,#300008 100%);box-shadow:0 0 10px rgba(232,0,26,.6)}
.disc.spin{animation:dspin 2s linear infinite}
.disc.glow{box-shadow:0 0 0 11px #111116,0 0 0 12px #222228,0 0 35px rgba(232,0,26,.4),0 0 70px rgba(232,0,26,.15)}
@keyframes dspin{to{transform:rotate(360deg)}}
.t-title{font-size:12px;font-weight:700;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;text-align:center}
.t-title.idle{color:var(--grey3)}

/* Progress */
.prog-wrap{padding:10px 22px 6px;flex-shrink:0}
.prog-bar{height:3px;background:var(--grey);border-radius:2px;cursor:pointer;position:relative;overflow:hidden}
.prog-fill{height:100%;width:0%;background:var(--red);border-radius:2px;box-shadow:0 0 8px rgba(232,0,26,.5);transition:width .2s linear;pointer-events:none}
.prog-bar:hover .prog-fill{box-shadow:0 0 16px rgba(232,0,26,.7)}
.time-row{display:flex;justify-content:space-between;font-size:8px;letter-spacing:.1em;color:var(--grey3);margin-top:5px}

/* Controls */
.ctrl-block{padding:12px 18px;border-bottom:1px solid var(--grey);flex-shrink:0}
.play-row{display:flex;justify-content:center;align-items:center;gap:5px;margin-bottom:10px}
.cb{background:none;border:none;color:var(--grey3);cursor:pointer;padding:6px;border-radius:50%;font-size:13px;transition:color .15s,transform .1s;display:flex;align-items:center;justify-content:center;width:32px;height:32px;line-height:1}
.cb:hover{color:var(--white);transform:scale(1.13)}
.cb.on{color:var(--red)}
.cb.play-btn{background:var(--red);color:white;width:44px;height:44px;font-size:16px;box-shadow:0 0 16px rgba(232,0,26,.5);transition:background .15s,transform .1s,box-shadow .2s}
.cb.play-btn:hover{background:var(--red2);transform:scale(1.07);box-shadow:0 0 28px rgba(232,0,26,.7)}
.cb.play-btn:active{transform:scale(.96)}

/* Mode row */
.mode-row{display:flex;justify-content:center;gap:4px;flex-wrap:wrap}
.mb{font-family:var(--fb);font-size:7px;letter-spacing:.13em;text-transform:uppercase;color:var(--grey3);background:none;border:1px solid var(--grey);padding:3px 7px;border-radius:2px;cursor:pointer;transition:color .15s,border-color .15s,background .15s;white-space:nowrap}
.mb:hover{color:var(--white);border-color:var(--grey2)}
.mb.on{color:var(--red);border-color:var(--red-dim);background:rgba(232,0,26,.06)}

/* Volume */
.vol-row{display:flex;align-items:center;gap:8px;padding:8px 22px 6px;flex-shrink:0}
.vol-ic{font-size:10px;color:var(--grey3)}
input[type=range].vol{flex:1;-webkit-appearance:none;height:3px;background:var(--grey);border-radius:2px;outline:none;cursor:pointer}
input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--red);cursor:pointer;transition:transform .1s}
input[type=range].vol:hover::-webkit-slider-thumb{transform:scale(1.3)}

/* Track list */
.tl-hdr{padding:10px 22px 8px;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--grey3);border-bottom:1px solid var(--grey);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.tracklist{overflow-y:auto;flex:1}
.tracklist::-webkit-scrollbar{width:3px}
.tracklist::-webkit-scrollbar-thumb{background:var(--grey)}
.ti{display:flex;align-items:center;gap:9px;padding:9px 22px;border-bottom:1px solid rgba(42,42,48,.45);cursor:pointer;transition:background .13s;animation:tifade .3s ease both}
@keyframes tifade{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
.ti:hover{background:var(--black3)}
.ti.active{background:rgba(232,0,26,.06);border-left:2px solid var(--red)}
.ti.active .ti-num{color:var(--red)}
.ti-num{font-size:9px;color:var(--grey3);width:15px;text-align:center;flex-shrink:0}
.eq{display:none;gap:2px;align-items:flex-end;height:12px;width:15px;flex-shrink:0}
.ti.active.playing .eq{display:flex}
.ti.active.playing .ti-num{display:none}
.eqb{width:3px;background:var(--red);border-radius:1px;animation:eqa .5s ease-in-out infinite alternate}
.eqb:nth-child(1){height:35%;animation-duration:.5s}
.eqb:nth-child(2){height:85%;animation-duration:.7s;animation-delay:.1s}
.eqb:nth-child(3){height:55%;animation-duration:.6s;animation-delay:.05s}
@keyframes eqa{from{transform:scaleY(.2)}to{transform:scaleY(1)}}
.ti-name{font-size:10px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}
.lbtn{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--grey3);background:none;border:1px solid var(--grey);padding:3px 5px;border-radius:2px;cursor:pointer;transition:color .15s,border-color .15s;flex-shrink:0}
.lbtn:hover{color:var(--red);border-color:var(--red-dim)}
.lbtn.has{color:var(--red);border-color:var(--red-dim)}
.empty-tl{padding:28px 22px;text-align:center;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--grey3)}

/* Upload */
.upl-wrap{padding:10px 22px;border-top:1px solid var(--grey);margin-top:auto;flex-shrink:0}
.uzone{border:1px dashed var(--grey);border-radius:3px;padding:10px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
.uzone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.uzone:hover,.uzone.drag{border-color:var(--red);background:rgba(232,0,26,.04)}
.uzone p{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--grey3)}
.uzone p strong{color:var(--red)}
.uprg{height:2px;background:var(--grey);border-radius:2px;margin-top:5px;display:none;overflow:hidden}
.uprg.on{display:block}
.uprg-bar{height:100%;background:var(--red);animation:upanim 1.1s ease infinite}
@keyframes upanim{0%{transform:translateX(-100%);width:60%}100%{transform:translateX(200%);width:60%}}

/* ─ RIGHT — Lyrics Stage ─ */
.right{position:relative;overflow:hidden;background:var(--black);min-height:520px}
@media(max-width:860px){.right{min-height:55vh}}

.stage-bg{position:absolute;font-family:var(--ft);font-size:clamp(60px,15vw,140px);color:rgba(232,0,26,.028);letter-spacing:.08em;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;pointer-events:none;user-select:none;z-index:0}

.sglow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(232,0,26,.13) 0%,transparent 70%);pointer-events:none;z-index:0;opacity:0;transition:opacity .6s}
.right.playing .sglow{opacity:1;animation:gpulse 2.5s ease-in-out infinite}
@keyframes gpulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.35);opacity:1}}

.particles{position:absolute;inset:0;pointer-events:none;z-index:1;overflow:hidden}
.pt{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--red);opacity:0;animation:pfloat linear infinite}
@keyframes pfloat{0%{opacity:0;transform:translateY(0) scale(1)}15%{opacity:.5}85%{opacity:.2}100%{opacity:0;transform:translateY(-320px) scale(.3) translateX(var(--d))}}

.s-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:3;pointer-events:none}
.s-hint .big{font-family:var(--ft);font-size:clamp(28px,5vw,56px);color:rgba(232,0,26,.22);letter-spacing:.1em;display:block;margin-bottom:6px}
.s-hint p{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--grey2)}

/* ─ Lyric words ─ */
.lw{position:absolute;font-family:var(--ft);pointer-events:none;user-select:none;z-index:5;white-space:nowrap;transform-origin:center center}

@keyframes floatDown {
  0% {
    top: -10%;
    transform: translateX(-50%);
  }

  100% {
    top: 110%;
    transform: translateX(-50%);
  }
}

.lyrics-note {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;

  color: rgba(255,255,255,0.35);
  text-align: center;

  pointer-events: none;
  z-index: 6;

  max-width: 90%;
}

/* ─ Toast ─ */
#toast{position:fixed;bottom:18px;right:18px;background:var(--black2);border:1px solid var(--grey);color:var(--white);font-size:9px;letter-spacing:.1em;padding:9px 14px;border-radius:3px;transform:translateY(14px);opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;z-index:9995;max-width:250px}
#toast.on{opacity:1;transform:translateY(0)}
#toast.ok{color:#00d87a;border-color:rgba(0,216,122,.3)}
#toast.err{color:var(--red);border-color:rgba(232,0,26,.3)}
</style>
</head>
<body>
<div class="layout">

  <!-- ── LEFT ── -->
  <div class="left">
    <div class="logo">
      <div class="logo-t">SOUND<em>WAVE</em></div>
      <div class="logo-sub">AI Player</div>
    </div>

    <div class="disc-wrap">
      <div class="disc" id="disc"></div>
      <div class="t-title idle" id="nowTitle">No track selected</div>
    </div>

    <div class="prog-wrap">
      <div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill"></div></div>
      <div class="time-row"><span id="tEl">0:00</span><span id="tDu">0:00</span></div>
    </div>

    <div class="ctrl-block">
      <div class="play-row">
        <button class="cb" id="btnShuffle" title="Shuffle">⇌</button>
        <button class="cb" id="btnPrev" title="Previous">⏮</button>
        <button class="cb play-btn" id="btnPlay" title="Play/Pause">▶</button>
        <button class="cb" id="btnNext" title="Next">⏭</button>
        <button class="cb" id="btnRepeat" title="Repeat">↻</button>
      </div>
      <div class="mode-row">
        <button class="mb on" id="mNormal">Normal</button>
        <button class="mb" id="mReverse">⬅ Reverse</button>
        <button class="mb" id="mDouble">2× Speed</button>
        <button class="mb" id="mHalf">½ Speed</button>
        <button class="mb" id="mSlow">Slow</button>
        <button class="mb" id="mNight">Nightcore</button>
      </div>
    </div>

    <div class="vol-row">
      <span class="vol-ic">◀</span>
      <input type="range" class="vol" id="vol" min="0" max="1" step=".01" value=".85"/>
      <span class="vol-ic">▶</span>
    </div>

    <div class="tl-hdr">
      <span>Tracks</span>
      <span id="tCount" style="font-size:8px;color:var(--grey3)">0</span>
    </div>
    <div class="tracklist" id="tracklist">
      <div class="empty-tl">Upload music to start</div>
    </div>

    <div class="upl-wrap">
      <div class="uzone" id="uzone">
        <input type="file" id="fInput" accept="audio/*"/>
        <p>Drop file or <strong>click to upload</strong></p>
      </div>
      <div class="uprg" id="uprg"><div class="uprg-bar"></div></div>
    </div>
  </div>

  <!-- ── RIGHT — Lyrics Stage ── -->
  <div class="right" id="stage">
    <div class="stage-bg" id="stageBg">LYRICS</div>
    <div class="sglow"></div>
    <div class="particles" id="pts"></div>
    <div class="lyrics-note">
    * AI-generated lyrics — may contain mistakes due to background noise
    </div>
    <div class="s-hint" id="sHint">
      <span class="big">LYRICS</span>
      <p>Play a track &amp; hit + LYR</p>
    </div>
  </div>
</div>

<audio id="aud"></audio>
<div id="toast"></div>

<script>
const API=(
  new URLSearchParams(window.location.search).get('api') ||
  localStorage.getItem('SOUNDWAVE_API') ||
  window.SOUNDWAVE_API ||
  'http://localhost:9090'
).replace(/\/$/, '');
const aud=document.getElementById('aud');
let tracks=[],curIdx=-1,lyricsCache={},curLyrics=[],lastActive=-1;
let doShuffle=false,doRepeat=false,mode='normal',revInt=null;
let animHandles=[];

/* ─ utils ─ */
const fmt=s=>{s=Math.floor(s||0);return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;};
const rnd=(a,b)=>a+Math.random()*(b-a);
let toastTid;
function toast(msg,type=''){
  const e=document.getElementById('toast');
  e.textContent=msg;e.className='on '+(type||'');
  clearTimeout(toastTid);toastTid=setTimeout(()=>e.className='',3200);
}

/* ─ particles ─ */
(()=>{
  const p=document.getElementById('pts');
  for(let i=0;i<24;i++){
    const e=document.createElement('div');
    e.className='pt';
    e.style.cssText=`left:${rnd(3,97)}%;bottom:${rnd(-8,8)}%;animation-duration:${rnd(7,20)}s;animation-delay:${rnd(0,16)}s;--d:${rnd(-70,70)}px`;
    p.appendChild(e);
  }
})();

/* ─ inject keyframes ─ */
const kfStyle=document.createElement('style');
kfStyle.textContent=`
@keyframes fromLeft{0%{transform:translateX(-120%) rotate(var(--r)) scale(.5);opacity:0}8%{opacity:1}80%{opacity:.75}100%{transform:translateX(140vw) rotate(var(--r)) scale(1.1);opacity:0}}
@keyframes fromRight{0%{transform:translateX(120%) rotate(var(--r)) scale(.5);opacity:0}8%{opacity:1}80%{opacity:.75}100%{transform:translateX(-140vw) rotate(var(--r)) scale(1.1);opacity:0}}
@keyframes riseUp{0%{transform:translateY(20px) scale(.4) rotate(var(--r));opacity:0}8%{opacity:1}85%{opacity:.5}100%{transform:translateY(calc(-100vh - 120px)) scale(1.2) rotate(var(--r));opacity:0}}
@keyframes fallIn{0%{transform:translateY(-60px) scale(.7) rotate(var(--r));opacity:0}10%{opacity:1}88%{opacity:.4}100%{transform:translateY(calc(100vh + 120px)) scale(1) rotate(var(--r));opacity:0}}
@keyframes explode{0%{transform:translate(0,0) scale(0) rotate(0deg);opacity:0}10%{opacity:1;transform:translate(calc(var(--ex)*.1),calc(var(--ey)*.1)) scale(1.4) rotate(var(--r))}90%{opacity:.2}100%{transform:translate(var(--ex),var(--ey)) scale(.3) rotate(calc(var(--r)*3));opacity:0}}
@keyframes diagFloat{0%{transform:translate(0,0) scale(.7) rotate(var(--r));opacity:0}10%{opacity:.9}85%{opacity:.3}100%{transform:translate(var(--dx),var(--dy)) scale(1.3) rotate(calc(var(--r)*2));opacity:0}}
@keyframes spin3d{0%{transform:perspective(300px) rotateY(0deg) scale(.6);opacity:0}8%{opacity:1}85%{opacity:.5}100%{transform:perspective(300px) rotateY(360deg) scale(1.2);opacity:0}}
@keyframes bigPulse{0%,100%{opacity:.06}50%{opacity:.14}}
`;
document.head.appendChild(kfStyle);

/* ─ load tracks ─ */
async function loadTracks(){
  try{const r=await fetch(`${API}/music`);tracks=await r.json()||[];renderList();}
  catch(e){toast('Cannot reach server','err');}
}

function renderList(){
  const el=document.getElementById('tracklist');
  document.getElementById('tCount').textContent=tracks.length;
  if(!tracks.length){el.innerHTML='<div class="empty-tl">Upload music to start</div>';return;}
  el.innerHTML='';
  tracks.forEach((t,i)=>{
    const hasL=!!(lyricsCache[t.id]&&lyricsCache[t.id].length);
    const isA=i===curIdx,isP=isA&&!aud.paused;
    const d=document.createElement('div');
    d.className='ti'+(isA?' active':'')+(isP?' playing':'');
    d.innerHTML=`
      <div class="eq"><div class="eqb"></div><div class="eqb"></div><div class="eqb"></div></div>
      <span class="ti-num">${i+1}</span>
      <span class="ti-name" title="${t.filename}">${t.filename.replace(/\.[^.]+$/,'')}</span>
      <button class="lbtn ${hasL?'has':''}" data-id="${t.id}" data-fn="${t.filename}">${hasL?'✦ LYR':'+ LYR'}</button>`;
    d.addEventListener('click',e=>{if(e.target.classList.contains('lbtn'))return;playTrack(i);});
    d.querySelector('.lbtn').addEventListener('click',e=>{e.stopPropagation();handleLyrics(t.id,t.filename);});
    el.appendChild(d);
  });
}

/* ─ playback ─ */
function playTrack(idx){
  if(idx<0||idx>=tracks.length)return;
  curIdx=idx;const t=tracks[idx];
  aud.src=`${API}/music/${t.id}`;
  aud.volume=parseFloat(document.getElementById('vol').value);
  applyMode(mode);
  aud.play().catch(()=>{});
  document.getElementById('nowTitle').textContent=t.filename.replace(/\.[^.]+$/,'');
  document.getElementById('nowTitle').classList.remove('idle');
  document.getElementById('stageBg').textContent=t.filename.replace(/\.[^.]+$/,'').slice(0,12).toUpperCase();
  renderList();showLyrics();lastActive=-1;
}

function applyMode(m){
  clearInterval(revInt);
  switch(m){
    case'reverse':aud.playbackRate=1;revInt=setInterval(()=>{if(!aud.paused)aud.currentTime=Math.max(0,aud.currentTime-.15);},100);break;
    case'double':aud.playbackRate=2;break;
    case'half':aud.playbackRate=.5;break;
    case'slow':aud.playbackRate=.75;break;
    case'nightcore':aud.playbackRate=1.3;break;
    default:aud.playbackRate=1;
  }
}

/* ─ control buttons ─ */
document.getElementById('btnPlay').addEventListener('click',()=>{
  if(curIdx<0&&tracks.length){playTrack(0);return;}
  aud.paused?aud.play().catch(()=>{}):aud.pause();
});
document.getElementById('btnPrev').addEventListener('click',()=>{
  if(aud.currentTime>3){aud.currentTime=0;return;}
  playTrack(curIdx>0?curIdx-1:tracks.length-1);
});
document.getElementById('btnNext').addEventListener('click',()=>{
  if(doShuffle){let n;do{n=Math.floor(Math.random()*tracks.length);}while(tracks.length>1&&n===curIdx);playTrack(n);}
  else playTrack(curIdx<tracks.length-1?curIdx+1:0);
});
document.getElementById('btnShuffle').addEventListener('click',function(){
  doShuffle=!doShuffle;this.classList.toggle('on',doShuffle);toast(doShuffle?'Shuffle on':'Shuffle off');
});
document.getElementById('btnRepeat').addEventListener('click',function(){
  doRepeat=!doRepeat;this.classList.toggle('on',doRepeat);toast(doRepeat?'Repeat on':'Repeat off');
});

/* ─ mode buttons ─ */
[['mNormal','normal'],['mReverse','reverse'],['mDouble','double'],['mHalf','half'],['mSlow','slow'],['mNight','nightcore']].forEach(([id,m])=>{
  document.getElementById(id).addEventListener('click',function(){
    mode=m;
    document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));
    this.classList.add('on');
    applyMode(m);toast(this.textContent.trim()+' mode');
  });
});

document.getElementById('progBar').addEventListener('click',e=>{
  if(!aud.duration)return;
  const r=e.currentTarget.getBoundingClientRect();
  aud.currentTime=((e.clientX-r.left)/r.width)*aud.duration;
});
document.getElementById('vol').addEventListener('input',e=>aud.volume=e.target.value);

aud.addEventListener('timeupdate',()=>{
  const p=aud.duration?(aud.currentTime/aud.duration)*100:0;
  document.getElementById('progFill').style.width=p+'%';
  document.getElementById('tEl').textContent=fmt(aud.currentTime);
  syncLyrics(aud.currentTime);
});
aud.addEventListener('loadedmetadata',()=>document.getElementById('tDu').textContent=fmt(aud.duration));
aud.addEventListener('play',()=>{
  document.getElementById('btnPlay').textContent='⏸';
  document.getElementById('disc').classList.add('spin','glow');
  document.getElementById('stage').classList.add('playing');
  renderList();
});
aud.addEventListener('pause',()=>{
  document.getElementById('btnPlay').textContent='▶';
  document.getElementById('disc').classList.remove('spin','glow');
  document.getElementById('stage').classList.remove('playing');
  renderList();
});
aud.addEventListener('ended',()=>{
  if(doRepeat){aud.currentTime=0;aud.play();}
  else if(doShuffle){let n;do{n=Math.floor(Math.random()*tracks.length);}while(tracks.length>1&&n===curIdx);playTrack(n);}
  else playTrack(curIdx<tracks.length-1?curIdx+1:0);
});

/* ─ upload ─ */
const fIn=document.getElementById('fInput'),uzone=document.getElementById('uzone');
fIn.addEventListener('change',()=>{if(fIn.files[0])doUpload(fIn.files[0]);});
uzone.addEventListener('dragover',e=>{e.preventDefault();uzone.classList.add('drag');});
uzone.addEventListener('dragleave',()=>uzone.classList.remove('drag'));
uzone.addEventListener('drop',e=>{e.preventDefault();uzone.classList.remove('drag');if(e.dataTransfer.files[0])doUpload(e.dataTransfer.files[0]);});
async function doUpload(f){
  if(!f.type.startsWith('audio/')){toast('Audio files only','err');return;}
  document.getElementById('uprg').classList.add('on');toast('Uploading '+f.name+'…');
  const fd=new FormData();fd.append('file',f);
  try{
    const r=await fetch(`${API}/music`,{method:'POST',body:fd});
    if(!r.ok)throw new Error(r.status);
    toast('Uploaded ✦','ok');await loadTracks();
  }catch(e){toast('Upload failed: '+e.message,'err');}
  finally{document.getElementById('uprg').classList.remove('on');fIn.value='';}
}

/* ─ lyrics ─ */
async function handleLyrics(id,fn){
  if(lyricsCache[id]&&lyricsCache[id].length){
    if(curIdx>=0&&tracks[curIdx].id===id)showLyrics();
    toast('Lyrics ready ✦','ok');return;
  }
  toast('Sending to Whisper AI — hold on…');
  setStageLoading();
  const name=fn.replace(/\.[^.]+$/,'');
  try{
    const a=await fetch(`${API}/lyrics`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({music_id:id,text:name})});
    if(!a.ok)throw new Error(a.status);
    const g=await fetch(`${API}/lyrics/${id}`);
    if(!g.ok)throw new Error(g.status);
    const d=await g.json();
    lyricsCache[id]=d.lyrics||[];
    if(curIdx>=0&&tracks[curIdx].id===id){showLyrics();lastActive=-1;}
    renderList();toast('Lyrics transcribed ✦','ok');
  }catch(e){toast('Transcription failed','err');setStageEmpty();}
}

function showLyrics(){
  if(curIdx<0)return;
  const id=tracks[curIdx].id;
  if(lyricsCache[id]){curLyrics=lyricsCache[id];clearStage();}
  else{curLyrics=[];setStageEmpty();}
}

/* ─ stage ─ */
function clearStage(){
  animHandles.forEach(h=>clearTimeout(h));animHandles=[];
  document.querySelectorAll('.lw').forEach(e=>e.remove());
  document.getElementById('sHint').style.display='none';
}
function setStageEmpty(){
  clearStage();
  const h=document.getElementById('sHint');
  h.style.display='block';
  h.innerHTML='<span class="big">LYRICS</span><p>Click + LYR to transcribe</p>';
}
function setStageLoading(){
  clearStage();
  const h=document.getElementById('sHint');
  h.style.display='block';
  h.innerHTML='<span class="big" style="animation:bigPulse 1.1s ease-in-out infinite;color:rgba(232,0,26,.35)">LOADING</span><p>Whisper AI transcribing…</p>';
}

/* ─ sync lyric lines to time ─ */
function syncLyrics(t){
  if(!curLyrics.length)return;
  let ai=-1;
  for(let i=0;i<curLyrics.length;i++){if(t>=curLyrics[i].start&&t<curLyrics[i].end){ai=i;break;}}
  if(ai!==-1&&ai!==lastActive){lastActive=ai;spawnLine(curLyrics[ai].text);}
}

/* ─ spawn lyric animations ─ */
const SIZES=['clamp(16px,3vw,30px)','clamp(22px,4.5vw,46px)','clamp(30px,6vw,66px)','clamp(44px,8vw,92px)','clamp(60px,11vw,120px)'];
const COLORS=['#e8001a','#ff4455','rgba(255,255,255,.92)','rgba(180,0,14,.95)','rgba(255,100,100,.85)','rgba(240,240,230,.7)'];

const ENTRANCES=[
  // from left
  el=>{el.style.left='0';el.style.top=rnd(6,85)+'%';el.style.animation=`fromLeft ${rnd(8,15)}s cubic-bezier(.05,.8,.25,1) forwards`;},
  // from right
  el=>{el.style.right='0';el.style.top=rnd(6,85)+'%';el.style.animation=`fromRight ${rnd(8,15)}s cubic-bezier(.05,.8,.25,1) forwards`;},
  // rise from bottom
  el=>{el.style.left=rnd(4,68)+'%';el.style.bottom='0';el.style.animation=`riseUp ${rnd(9,17)}s ease-out forwards`;},
  // fall from top
  el=>{el.style.left=rnd(4,68)+'%';el.style.top='0';el.style.animation=`fallIn ${rnd(8,14)}s ease-out forwards`;},
  // explode from center
  el=>{el.style.left='38%';el.style.top='40%';const ex=rnd(-280,280),ey=rnd(-200,200);el.style.setProperty('--ex',ex+'px');el.style.setProperty('--ey',ey+'px');el.style.animation=`explode ${rnd(5,12)}s ease-out forwards`;},
  // diagonal float
  el=>{el.style.left=rnd(0,15)+'%';el.style.top=rnd(15,75)+'%';el.style.setProperty('--dx',rnd(220,620)+'px');el.style.setProperty('--dy',rnd(-220,80)+'px');el.style.animation=`diagFloat ${rnd(10,18)}s linear forwards`;},
  // 3d spin
  el=>{el.style.left=rnd(10,60)+'%';el.style.top=rnd(10,70)+'%';el.style.animation=`spin3d ${rnd(6,12)}s ease-in-out forwards`;},
];


function spawnLine(text) {
  const stage = document.getElementById('stage')

  const el = document.createElement('div')
  el.className = 'lw'
  el.textContent = text

  const colors = [
    '#e8001a',
    '#ff4455',
    '#ffffff',
    '#ff8080',
    '#f2ede6'
  ]

  const color = colors[Math.floor(Math.random() * colors.length)]

  el.style.cssText = `
    position: absolute;
    left: 50%;
    top: -10%;
    transform: translateX(-50%);
    font-family: var(--ft);
    font-size: clamp(16px, 3vw, 28px);
    color: ${color};
    text-align: center;

    max-width: 90%;            /* 👈 keeps inside screen */
    white-space: normal;       /* 👈 allows wrapping */
    word-wrap: break-word;     /* 👈 breaks long text */

    animation: floatDown ${16 + Math.random() * 6}s linear forwards;
  `

  stage.appendChild(el)

  setTimeout(() => {
    el.remove()
  }, 22000)
}


/* ─ init ─ */
loadTracks();
</script>
