version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: music_db
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: 1241
      POSTGRES_DB: music_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d

  # rabbitmq:
  #   image: rabbitmq:3-management
  #   container_name: rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"

  music-service:
    build: ./music-service
    ports:
      - "50051:50051"
    env_file:
      - ./music-service/.env
    depends_on:
      - postgres
      # - rabbitmq

  migrator-music:
    build: ./music-service/migrator
    depends_on:
      - postgres
    command: [
      "-path=/migrations",
      "-database=postgresql://docker:1241@postgres:5432/music_db?sslmode=disable",
      "up",
    ]

  migrator-lyrics:
    build: ./lyrics-service/migrator
    depends_on:
      - postgres
    command: [
      "-path=/migrations",
      "-database=postgresql://docker:1241@postgres:5432/lyrics_db?sslmode=disable",
      "up",
    ]

  frontend:
    build: ./frontend
    ports:
      - "3000:80"

volumes:
  postgres_data: