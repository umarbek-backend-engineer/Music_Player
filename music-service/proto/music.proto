syntax = "proto3";

package music;

import "google/protobuf/empty.proto";

option go_package = "github.com/umarbek-backend-engineer/Music_Player/music-service/proto/gen;pb";

service MusicService {
    rpc ListMusic(google.protobuf.Empty) returns (ListResponse);
    rpc UploadMusic(stream UploadMusicChunks) returns (UploadMusicResponse);
    rpc StreamMusic(StreamRequest) returns (stream MusicChunk);

    rpc GetPublicMusic(google.protobuf.Empty) returns (PublicMusicResponse);    
    rpc ChangeVisible(ChangeVisibleRequest) returns (google.protobuf.Empty);
}

message ChangeVisibleRequest{
    bool is_public = 1;
}

message PublicMusicResponse {
    repeated PublicMusic music = 1;
}

message PublicMusic {
    string music_id = 1;
    string user_id = 2;
    string title = 3;
    bool is_public = 4;
}

message UploadMusicResponse {
    string status = 1;
}

message UploadMusicChunks {
    string title = 1;
    bytes data = 2;
}

message MusicItem {
    string id = 1;
    string title = 2;
}

message ListResponse {
    repeated MusicItem songs = 1;
}

message StreamRequest {
    string id = 1;
}

message MusicChunk {
    string title = 1;
    bytes content = 2;
}