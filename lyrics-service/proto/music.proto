syntax = "proto3";

package music;

option go_package = "github.com/umarbek-backend-engineer/Music_Player/lyrics-service/proto/gen;pb";

service MusicService {
    rpc StreamMusic(StreamRequest) returns (stream MusicChunk);
}

message StreamRequest {
    string id = 1;
}

message MusicChunk {
    string name = 1;
    bytes content = 2;
}