syntax = "proto3";

package lyrics;

import "google/protobuf/empty.proto";

option go_package = "github.com/umarbek-backend-engineer/Music_Player/lyrics-service/proto/gen;pb";

service LyricsService {
    rpc GetLyrics(GetLyricsRequest) returns (LyricsResponse);
    rpc AddLyrics(AddLyricsRequest) returns (google.protobuf.Empty);
}

message GetLyricsRequest {
    string music_id = 1;
}

message LyricsResponse{
    string language = 1;
    repeated LyricsStruct lyrics = 2;
}

message LyricsStruct {
    float start = 1;
    float end = 2;
    string text = 3;
}

message AddLyricsRequest {
    string music_id = 1;
    string text = 2;
}
