syntax = "proto3";

package music;

import "lyrics.proto";

option go_package = "./proto/gen;pb";

service MusicService {
    rpc ListMusic(lyrics.Empty) returns (ListResponse);
    rpc UploadMusic(stream UploadMusicChunks) returns (UploadMusicResponse);
    rpc StreamMusic(StreamRequest) returns (stream MusicChunk);
}

message UploadMusicResponse {
    string status = 1;
}

message UploadMusicChunks {
    string filename = 1;
    bytes data = 2;
}

message MusicItem {
    string id = 1;
    string filename = 2;
}

message ListResponse {
    repeated MusicItem songs = 1;
}

message StreamRequest {
    string id = 1;
}

message MusicChunk {
    string name = 1;
    bytes content = 2;
}