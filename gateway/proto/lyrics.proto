syntax = "proto3";

package lyrics;

option go_package = "./proto/gen;pb";

service LyricsService {
    rpc GetLyrics(GetLyricsRequest) returns (LyricsResponse);
    rpc AddLyrics(AddLyricsRequest) returns (Empty);
}

message GetLyricsRequest {
    string music_id = 1;
}

message LyricsResponse{
    string music_id = 1;
    string text = 2;
}

message AddLyricsRequest {
    string music_id = 1;
    string text = 2;
}

message Empty {}
